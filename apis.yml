description: >-
  The Defense Finance and Accounting Service (DFAS) is the agency within the
  Department of Defense responsible for paying members of the U.S. military,
  DoD civilian employees, contractors, and annuitants, as well as providing
  finance and accounting services to DoD components and other federal
  agencies. DFAS exposes member-facing self-service portals such as myPay
  but does not currently publish a public developer API.
